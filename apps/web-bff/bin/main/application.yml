# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.neuron.bff: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/bff.log
    max-size: 10MB
    max-history: 30

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  credentials:
    profile: default

# Database Configuration (placeholder - to be configured per environment)
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neuron}
    username: ${DB_USERNAME:neuron}
    password: ${DB_PASSWORD:neuron}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Application Configuration
app:
  name: neuron-bff
  version: 1.0.0-SNAPSHOT
  api:
    prefix: /api
    version: v1
