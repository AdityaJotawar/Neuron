service: neuron-bff

frameworkVersion: "4"

provider:
  name: aws
  runtime: java17
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    LOG_LEVEL: INFO

functions:
  bff-api:
    handler: com.neuron.bff.handler.ApiGatewayHandler::handleRequest
    memorySize: 256
    timeout: 30
    events:
      - http:
          path: /api/dashboard
          method: get
          cors: true
      - http:
          path: /api/accounts
          method: get
          cors: true
      - http:
          path: /api/accounts
          method: post
          cors: true
      - http:
          path: /api/transactions
          method: get
          cors: true
      - http:
          path: /api/budgets
          method: get
          cors: true
      - http:
          path: /api/budgets
          method: post
          cors: true
      - http:
          path: /api/investments
          method: get
          cors: true
      - http:
          path: /api/investments
          method: post
          cors: true

package:
  artifact: build/distributions/bff-api.zip

plugins:
  - serverless-java-compiler

custom:
  java:
    jar: build/libs/neighbor-bff-1.0.0-SNAPSHOT.jar
